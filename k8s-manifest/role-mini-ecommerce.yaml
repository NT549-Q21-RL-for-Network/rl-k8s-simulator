apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rl-agent-role
  namespace: mini-ecommerce
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "watch", "patch", "update"]
